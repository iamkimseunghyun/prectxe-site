# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit 설정 — 한국어 리뷰. https://docs.coderabbit.ai/reference/configuration
language: ko-KR
tone_instructions: >-
  한국어로 간결하고 실용적으로 리뷰한다. 실제 버그·타입 안전성·보안·
  데이터 정합성 문제를 우선하고, 사소한 스타일은 Biome가 잡으니 중복 지적하지 않는다.
reviews:
  # chill: 핵심 위주(노이즈↓) / assertive: 더 깐깐하게. 필요 시 전환.
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
    base_branches:
      - main
  # 정적 JSX/콘텐츠 페이지엔 함수가 없어 docstring 0% 경고가 매번 떠 노이즈가 됨 → 해제
  pre_merge_checks:
    docstrings:
      mode: 'off'
  path_filters:
    - '!**/bun.lock'
    - '!**/*.lock'
    - '!**/node_modules/**'
    - '!src/generated/**'
    - '!**/*.min.js'
  # 프로젝트는 Biome로 lint/format 통일 — CodeRabbit이 중복 지적하지 않도록
  # 코드 품질 지적은 버그·로직 중심으로 한정.
  tools:
    biome:
      enabled: true
chat:
  auto_reply: true
